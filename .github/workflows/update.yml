name: nightly-update
on:
  schedule:
    - cron: '30 12 * * 0-5'   # 12:30 UTC = 21:30 KST (일~금)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: fetch data + build
        run: |
          python3 fetch_data.py
          python3 generate.py
          cp dashboard.html index.html
      - name: commit
        run: |
          git config user.name "dashboard-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "auto update $(TZ=Asia/Seoul date +%F)" || echo "no change"
          git push
